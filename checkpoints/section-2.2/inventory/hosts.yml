---
# =============================================================================
# inventory/hosts.yml — The workshop's working inventory
# =============================================================================
# This is the inventory file attendees use during the workshop sections,
# starting at 1.4 (preflight) and continuing through 4.3 (capstone).
#
# This is INTENTIONALLY DIFFERENT from provisioning/azure/inventory/attendees.yml.
# That file is about Azure resources and only the instructor uses it.
# This file is about the three (sometimes four) VMs each attendee runs
# playbooks against during the workshop.
#
# The hosts here are referenced by short name. In each attendee's lab:
#
#   control  → 127.0.0.1 (the attendee runs ansible from control itself)
#   web1     → 10.<attendee_number>.0.10
#   web2     → 10.<attendee_number>.0.11  (added during section 3.3)
#   mgmt1    → 10.<attendee_number>.0.20
#
# Because each attendee's network has the third octet matching their attendee
# number, we resolve hostnames via /etc/hosts entries written by cloud-init,
# not by hardcoding the third octet here. This way the inventory file is
# identical for every attendee — they just refer to "web1" and DNS/hosts
# resolves it to the right IP for their attendee number.
# =============================================================================

all:
  children:

    # -------------------------------------------------------------------------
    # Linux hosts: the control node and the web tier
    # -------------------------------------------------------------------------
    linux:
      hosts:
        web1:
          ansible_host: web1   # resolved via /etc/hosts on the control node
          # web1 is the primary Linux web server, target for sections 2.1,
          # 2.2, 3.1, and 3.3
        web2:
          ansible_host: web2   # resolved via /etc/hosts on the control node
          # web2 is added during section 3.3 for the rolling deploy demo.
          # It exists in the inventory from the start so the playbooks work
          # cleanly — but it doesn't actually exist as a VM until the
          # provisioning happens during section 3.3 itself.
          # Until then, any playbook targeting web2 will fail with a
          # connection error. This is intentional — section 3.3 LAB-3.3.md
          # walks attendees through bringing it online.

    # -------------------------------------------------------------------------
    # Windows hosts: the management host
    # -------------------------------------------------------------------------
    windows:
      hosts:
        mgmt1:
          ansible_host: mgmt1   # resolved via /etc/hosts on the control node
          # mgmt1 is the Windows Server 2022 management host.
          # All Windows-specific connection variables are in
          # inventory/group_vars/windows.yml

    # -------------------------------------------------------------------------
    # Convenience groups
    # -------------------------------------------------------------------------
    # webservers groups web1 and web2 together. Used by section 3.3's rolling
    # deploy playbook to roll across both at once.
    webservers:
      hosts:
        web1:
        web2:

    # branch_office contains every host in the lab. Used by section 3.1's
    # cross-platform hardening role and section 4.3's capstone playbook.
    branch_office:
      children:
        linux:
        windows:
