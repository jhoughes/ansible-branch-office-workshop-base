; =============================================================================
; ansible.cfg — Workshop configuration
; =============================================================================
; This file is read by Ansible from the current directory when you run any
; ansible command from the workshop root. It sets defaults that make the
; workshop behave consistently across all attendee environments.
;
; If you want to learn what each option does, run:
;   ansible-config list
; or visit https://docs.ansible.com/ansible/latest/reference_appendices/config.html
; =============================================================================

[defaults]
; Where to find the inventory. Attendees can override with -i on the command line.
inventory = inventory/hosts.yml

; Where to find roles. Includes the workshop's own roles directory.
roles_path = roles

; Disable host key checking for the lab — every attendee's hosts are fresh
; from Azure provisioning, so SSH host keys won't be in known_hosts yet.
; This is a LAB setting. In production, leave this on.
host_key_checking = False

; Use the YAML callback for nicer output. The default callback is fine, but
; YAML output is much easier to read when something goes wrong.
stdout_callback = yaml

; Show task timing on every run. Helpful for the troubleshooting section.
callbacks_enabled = profile_tasks, timer

; Don't create .retry files in the working directory — they clutter the repo.
retry_files_enabled = False

; Number of parallel forks. The lab is small (3-4 hosts) so this doesn't
; matter much, but setting it explicitly is good practice.
forks = 10

; Where the Vault password file lives. Attendees create this from the
; .vault-pass.example file during section 3.2.
vault_password_file = .vault-pass

; The interpreter discovery setting suppresses a noisy warning on modern
; Ubuntu hosts where /usr/bin/python3 is the only Python.
interpreter_python = auto_silent

[inventory]
; Enable both the YAML and INI inventory plugins. Attendees see both formats
; in the wild, and the workshop uses YAML.
enable_plugins = yaml, ini

[ssh_connection]
; SSH multiplexing — speeds up multi-task runs significantly.
; ControlPersist keeps the connection open for 60 seconds after the last task.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

; Enable pipelining for a meaningful speed boost on most modules.
; Requires `requiretty` to be disabled in sudoers (it is, on Ubuntu).
pipelining = True
